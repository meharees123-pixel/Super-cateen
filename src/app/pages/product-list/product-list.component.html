<section class="page">
  <div class="alert" *ngIf="errorMessage">{{ errorMessage }}</div>
  <div class="loading" *ngIf="isLoading">Loading…</div>

  <div class="catalog" *ngIf="!isLoading">
    <aside class="catalog-sidebar">
      <div class="catalog-columns">
        <section class="column">
          <div class="column-inner">
            <ul class="category-list">
            <li>
              <button
                class="category-row"
                type="button"
                [class.active]="!activeCategoryId"
                (click)="selectCategory('')"
                [attr.aria-pressed]="!activeCategoryId"
              >
                <span>
                  <strong>All categories</strong>
                </span>
                <i class="bi bi-chevron-right arrow-icon"></i>
              </button>
            </li>
            <li *ngFor="let c of categories; trackBy: trackById">
              <button
                class="category-row"
                type="button"
                [class.active]="idOf(c) === activeCategoryId"
                (click)="selectCategory(idOf(c))"
                [attr.aria-pressed]="idOf(c) === activeCategoryId"
              >
                <span>
                  <strong>{{ c?.name || 'Category' }}</strong>
                </span>
                <i class="bi bi-chevron-right arrow-icon"></i>
              </button>
            </li>
          </ul>
          </div>
        </section>

        <section class="column">
          <div class="column-inner">
            <div class="muted small" *ngIf="subcategoriesLoading">Loading subcategories…</div>
            <ul class="subcategory-list" *ngIf="!subcategoriesLoading">
              <li *ngFor="let sub of subcategoryList; trackBy: trackBySubcategory">
                <button
                  type="button"
                  class="subcategory-row"
                  [class.active]="idOf(sub) === activeSubcategoryId"
                  (click)="selectSubcategory(idOf(sub))"
                  [attr.aria-pressed]="idOf(sub) === activeSubcategoryId"
                >
                  <div class="subcategory-media">
                    <img
                      *ngIf="sub?.image || sub?.subcategoryImage; else subcatPlaceholder"
                      [src]="sub?.image || sub?.subcategoryImage"
                      [alt]="sub?.name || sub?.title || 'Subcategory'"
                    />
                    <ng-template #subcatPlaceholder>
                      <div class="subcat-img-ph">No image</div>
                    </ng-template>
                  </div>
                  <span class="subcategory-label">
                    {{ sub?.name || sub?.title || 'Subcategory' }}
                  </span>
                </button>
              </li>
            </ul>
          </div>
        </section>
      </div>
    </aside>

    <div class="products">
      <div class="products-head">
        <div>
          <h2>Products</h2>
          <div class="muted">{{ filteredProducts.length }} of {{ activeProducts.length }} visible</div>
        </div>
        <div class="search-wrap">
          <input
            class="search-input"
            [(ngModel)]="q"
            type="search"
            placeholder="Search products by name or description"
          />
          <button class="btn btn-outline sm" type="button" (click)="clearSearch()" *ngIf="q.trim()">Clear</button>
        </div>
      </div>

      <div class="product-grid" *ngIf="filteredProducts.length; else noProducts">
        <article class="product-card" *ngFor="let p of filteredProducts; trackBy: trackById">
          <div class="img">
            <img *ngIf="p?.productImage; else placeholder" [src]="p.productImage" [alt]="p?.name || 'Product'" />
            <ng-template #placeholder>
              <div class="img-ph">No image</div>
            </ng-template>
          </div>

          <div class="body">
            <div class="title">{{ p?.name }}</div>
            <div class="price">{{ p?.price | currency : 'USD' : 'symbol' : '1.0-2' }}</div>
            <div class="desc" *ngIf="p?.description">{{ p.description }}</div>
          </div>

          <div class="actions">
            <ng-container *ngIf="qtyFor(p) as qty; else addBtn">
              <div class="qty">
                <button class="btn btn-outline sm" type="button" (click)="changeQty(p, -1)" [disabled]="addingProductId === idOf(p)">
                  −
                </button>
                <div class="qty-value">{{ qty }}</div>
                <button class="btn btn-primary sm" type="button" (click)="changeQty(p, 1)" [disabled]="addingProductId === idOf(p)">
                  +
                </button>
              </div>
            </ng-container>
            <ng-template #addBtn>
              <button
                class="btn btn-primary"
                (click)="addToCart(p)"
                [disabled]="addingProductId === idOf(p) || (p?.quantity ?? 1) <= 0"
              >
                {{
                  (p?.quantity ?? 1) <= 0 ? 'Out of stock' : addingProductId === idOf(p) ? 'Adding…' : 'Add to cart'
                }}
              </button>
            </ng-template>
          </div>
        </article>
      </div>
      <ng-template #noProducts>
        <div class="empty">No products for the selected category.</div>
      </ng-template>
    </div>
  </div>
</section>
