<div class="app-shell">
  <header class="app-header">
    <style>
      .app-header {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        min-width: 0;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
        text-decoration: none;
      }

      .brand .mark,
      .brand .brand-mark,
      .brand .initials {
        display: none !important;
      }

      .brand-logo {
        width: 34px;
        height: 34px;
        object-fit: contain;
        display: block;
      }

      .brand-text {
        font-weight: 900;
        white-space: nowrap;
      }

      .nav-toggle {
        display: none;
      }

      .hamburger {
        display: none;
        width: 40px;
        height: 40px;
        padding: 0;
        align-items: center;
        justify-content: center;
      }

      .nav {
        display: flex;
        align-items: center;
        gap: 8px;
        flex: 1 1 auto;
        min-width: 0;
      }

      .nav a {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        border-radius: 12px;
        text-decoration: none;
        white-space: nowrap;
      }

      .header-actions {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-left: auto;
        flex: 0 0 auto;
      }

      .icon-link {
        width: 40px;
        height: 40px;
        border-radius: 12px;
        display: inline-grid;
        place-items: center;
        position: relative;
        text-decoration: none;
        border: 1px solid rgba(15, 23, 42, 0.08);
        background: rgba(255, 255, 255, 0.85);
      }

      .icon-link .badge {
        position: absolute;
        top: -6px;
        right: -6px;
        min-width: 18px;
        height: 18px;
        padding: 0 6px;
        display: inline-grid;
        place-items: center;
        font-size: 12px;
        font-weight: 900;
        line-height: 1;
        border-radius: 999px;
        background: #0f172a;
        color: #fff;
      }

      @media (max-width: 820px) {
        .brand-text {
          display: none;
        }
      }

      @media (max-width: 720px) {
        .hamburger {
          display: inline-flex;
          margin-left: auto;
        }

        .header-actions {
          order: 3;
          margin-left: 0;
        }

        .nav {
          order: 10;
          width: 100%;
          display: none;
          flex-direction: column;
          align-items: stretch;
          padding: 10px;
          border-radius: 14px;
          border: 1px solid rgba(15, 23, 42, 0.08);
          background: rgba(255, 255, 255, 0.92);
          backdrop-filter: blur(10px);
        }

        .nav a {
          padding: 10px 12px;
        }

        .nav-toggle:checked ~ .nav {
          display: flex;
        }
      }
    </style>

    <a class="brand" routerLink="/dashboard">
      <img class="brand-logo" src="/logo.png" alt="Super Cateen" width="34" height="34" decoding="async" />
      <span class="brand-mark">SC</span>
      <span class="brand-text">SuperCateen</span>
    </a>

    <input class="nav-toggle" type="checkbox" id="nav-toggle" *ngIf="isLoggedIn()" />
    <label class="hamburger btn btn-outline" for="nav-toggle" *ngIf="isLoggedIn()" aria-label="Menu">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </svg>
    </label>

    <nav class="nav" *ngIf="isLoggedIn()">
      <a routerLink="/dashboard" routerLinkActive="active">Home</a>
      <a routerLink="/search" routerLinkActive="active">Search</a>
      <a routerLink="/orders" routerLinkActive="active">Orders</a>
      <a routerLink="/stores" routerLinkActive="active">Store<span *ngIf="storeName()">: {{ storeName() }}</span></a>
    </nav>

    <div class="header-actions" *ngIf="isLoggedIn()">
      <a class="icon-link" routerLink="/profile" routerLinkActive="active" aria-label="Profile">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M20 21a8 8 0 1 0-16 0" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
          <path
            d="M12 13a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </a>
      <a class="icon-link" routerLink="/cart" routerLinkActive="active" aria-label="Cart">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path
            d="M6.5 6H21l-1.7 8.5a2 2 0 0 1-2 1.6H9.1a2 2 0 0 1-2-1.6L5.3 3.8A1.5 1.5 0 0 0 3.8 2.5H2.5"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <path d="M9.5 21a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z" fill="currentColor" />
          <path d="M17.5 21a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z" fill="currentColor" />
        </svg>
        <span class="badge" *ngIf="cartCount()">{{ cartCount() }}</span>
      </a>
      <button class="btn btn-outline" (click)="logout()">Logout</button>
    </div>
  </header>
  <div class="top-loader" *ngIf="loading.isLoading()"></div>

  <main class="app-main">
    <router-outlet></router-outlet>
  </main>

  <footer class="app-footer">
    <div>© {{ currentYear }} SuperCateen</div>
    <div class="muted">Powered by Store API</div>
  </footer>

  <div class="toast-wrap" *ngIf="toast.toasts().length">
    <button class="toast" *ngFor="let t of toast.toasts()" [class]="t.type" (click)="dismissToast(t.id)">
      <div class="toast-msg">{{ t.message }}</div>
      <div class="toast-hint">Click to dismiss</div>
    </button>
  </div>
</div>
