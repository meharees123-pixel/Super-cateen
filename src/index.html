<!doctype html>
<html lang="en">
  <head>
  <meta charset="utf-8">
  <title>SuperCateen</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
      :root {
        --brand-pink: #ec4899;
        --brand-orange: #fb923c;
        --brand-yellow: #facc15;
        --brand-ring: rgba(236, 72, 153, 0.22);
        --brand-grad: linear-gradient(90deg, var(--brand-pink), var(--brand-orange), var(--brand-yellow));
        --bs-primary: var(--brand-pink);
        --bs-primary-rgb: 236, 72, 153;
        --bs-link-color: var(--brand-pink);
        --bs-link-hover-color: #be185d;
        --bs-focus-ring-color: var(--brand-ring);
        --primary: var(--brand-pink);
        --primary-rgb: 236, 72, 153;
      }

      a {
        color: var(--brand-pink);
      }

      a:hover {
        color: #be185d;
      }

      .btn.btn-primary,
      button.btn.btn-primary,
      a.btn.btn-primary,
      .btn-primary,
      form button[type='submit'],
      form input[type='submit'] {
        border: 0 !important;
        background: var(--brand-grad) !important;
        color: #0b1220 !important;
      }

      .btn.btn-primary:disabled,
      button.btn.btn-primary:disabled,
      a.btn.btn-primary:disabled,
      .btn-primary:disabled,
      form button[type='submit']:disabled,
      form input[type='submit']:disabled {
        background: rgba(15, 23, 42, 0.22) !important;
        color: rgba(255, 255, 255, 0.88) !important;
      }

      .btn.btn-outline,
      button.btn.btn-outline,
      a.btn.btn-outline,
      .btn-outline {
        border-color: rgba(236, 72, 153, 0.35) !important;
        color: var(--brand-pink) !important;
        background: rgba(236, 72, 153, 0.06) !important;
      }

      input:focus,
      select:focus,
      textarea:focus,
      .input:focus,
      .form-control:focus {
        border-color: rgba(236, 72, 153, 0.5) !important;
        box-shadow: 0 0 0 3px var(--brand-ring) !important;
        outline: none !important;
      }

      :focus-visible {
        outline: 3px solid var(--brand-ring);
        outline-offset: 2px;
      }

      a.active,
      .nav-link.active,
      .router-link-active,
      .router-link-exact-active {
        color: var(--brand-pink) !important;
      }

      /* Active nav (works when routerLinkActive is on <a>, <li>, etc.) */
      [routerLinkActive].active,
      [routerLinkActive].active > a,
      [routerLinkActive].active a,
      a.active,
      a.router-link-active,
      a.router-link-exact-active {
        color: var(--brand-pink) !important;
      }

      .nav a.active,
      .nav a.router-link-active,
      .nav a.router-link-exact-active {
        background: rgba(236, 72, 153, 0.08) !important;
        box-shadow: 0 0 0 3px rgba(236, 72, 153, 0.12) !important;
        border-radius: 12px;
        text-decoration: none;
      }

      /* Fallback active state even if RouterLinkActive isn't working */
      html[data-nav='dashboard'] .nav a[href='/dashboard'],
      html[data-nav='search'] .nav a[href='/search'],
      html[data-nav='cart'] .nav a[href='/cart'],
      html[data-nav='orders'] .nav a[href='/orders'],
      html[data-nav='profile'] .nav a[href='/profile'],
      html[data-nav='stores'] .nav a[href='/stores'] {
        background: rgba(236, 72, 153, 0.08) !important;
        box-shadow: 0 0 0 3px rgba(236, 72, 153, 0.12) !important;
        border-radius: 12px;
        text-decoration: none;
        color: var(--brand-pink) !important;
      }

      nav a:hover,
      .topbar a:hover,
      .navbar a:hover {
        color: var(--brand-pink) !important;
      }

      nav a.router-link-active,
      nav a.router-link-exact-active,
      .topbar a.router-link-active,
      .topbar a.router-link-exact-active,
      .navbar a.router-link-active,
      .navbar a.router-link-exact-active,
      nav a.active,
      .topbar a.active,
      .navbar a.active {
        color: var(--brand-pink) !important;
        box-shadow: 0 0 0 3px rgba(236, 72, 153, 0.12) !important;
        border-radius: 12px;
      }

      /* Super-cateen nav responsiveness */
      .nav {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        min-width: 0;
      }

      .nav a {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        border-radius: 12px;
        text-decoration: none;
        min-width: 0;
      }

      /* App-wide responsive helpers */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      img,
      svg,
      video,
      canvas {
        max-width: 100%;
        height: auto;
      }

      body {
        overflow-x: hidden;
      }

      .page {
        max-width: 1200px;
        margin: 0 auto;
      }

      @media (max-width: 720px) {
        .page {
          padding-left: 12px;
          padding-right: 12px;
        }
      }

      /* Common "header" rows should wrap instead of overflow */
      .page-head,
      .section-head {
        flex-wrap: wrap;
      }

      /* Make product grids responsive across pages that reuse this class */
      .product-grid {
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)) !important;
      }

      @media (max-width: 720px) {
        .nav {
          flex-wrap: nowrap;
          overflow-x: auto;
          -webkit-overflow-scrolling: touch;
          padding-bottom: 4px;
        }

        .nav a {
          flex: 0 0 auto;
          white-space: nowrap;
        }
      }

      /* Cart: icon-only on nav, pinned first */
      .nav a[href='/cart'] {
        order: 999;
        margin-left: auto;
        font-size: 0; /* hide "Cart" text, keep badge visible */
        align-items: center;
        height: 34px;
      }

      .nav a[href='/cart'] .badge {
        display: inline-grid;
        place-items: center;
        min-width: 18px;
        height: 18px;
        padding: 0 6px;
        font-size: 12px;
        line-height: 1;
        margin-left: 8px;
      }

      .nav a[href='/cart']::before {
        content: '';
        width: 18px;
        height: 18px;
        background: currentColor;
        -webkit-mask: url("data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20viewBox%3D%270%200%2024%2024%27%20fill%3D%27none%27%3E%3Cpath%20d%3D%27M6.5%206H21l-1.7%208.5a2%202%200%200%201-2%201.6H9.1a2%202%200%200%201-2-1.6L5.3%203.8A1.5%201.5%200%200%200%203.8%202.5H2.5%27%20stroke%3D%27black%27%20stroke-width%3D%272%27%20stroke-linecap%3D%27round%27%20stroke-linejoin%3D%27round%27/%3E%3Cpath%20d%3D%27M9.5%2021a1%201%200%201%200%200-2%201%201%200%200%200%200%202Z%27%20fill%3D%27black%27/%3E%3Cpath%20d%3D%27M17.5%2021a1%201%200%201%200%200-2%201%201%200%200%200%200%202Z%27%20fill%3D%27black%27/%3E%3C/svg%3E") no-repeat center / contain;
        mask: url("data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20viewBox%3D%270%200%2024%2024%27%20fill%3D%27none%27%3E%3Cpath%20d%3D%27M6.5%206H21l-1.7%208.5a2%202%200%200%201-2%201.6H9.1a2%202%200%200%201-2-1.6L5.3%203.8A1.5%201.5%200%200%200%203.8%202.5H2.5%27%20stroke%3D%27black%27%20stroke-width%3D%272%27%20stroke-linecap%3D%27round%27%20stroke-linejoin%3D%27round%27/%3E%3Cpath%20d%3D%27M9.5%2021a1%201%200%201%200%200-2%201%201%200%200%200%200%202Z%27%20fill%3D%27black%27/%3E%3Cpath%20d%3D%27M17.5%2021a1%201%200%201%200%200-2%201%201%200%200%200%200%202Z%27%20fill%3D%27black%27/%3E%3C/svg%3E") no-repeat center / contain;
      }

      /* Profile: icon-only in nav */
      .nav a[href='/profile'] {
        font-size: 0;
        align-items: center;
        height: 34px;
      }

      .nav a[href='/profile']::before {
        content: '';
        width: 18px;
        height: 18px;
        background: currentColor;
        -webkit-mask: url("data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20viewBox%3D%270%200%2024%2024%27%20fill%3D%27none%27%3E%3Cpath%20d%3D%27M20%2021a8%208%200%201%200-16%200%27%20stroke%3D%27black%27%20stroke-width%3D%272%27%20stroke-linecap%3D%27round%27/%3E%3Cpath%20d%3D%27M12%2013a4%204%200%201%200%200-8%204%204%200%200%200%200%208Z%27%20stroke%3D%27black%27%20stroke-width%3D%272%27%20stroke-linecap%3D%27round%27%20stroke-linejoin%3D%27round%27/%3E%3C/svg%3E") no-repeat center / contain;
        mask: url("data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20viewBox%3D%270%200%2024%2024%27%20fill%3D%27none%27%3E%3Cpath%20d%3D%27M20%2021a8%208%200%201%200-16%200%27%20stroke%3D%27black%27%20stroke-width%3D%272%27%20stroke-linecap%3D%27round%27/%3E%3Cpath%20d%3D%27M12%2013a4%204%200%201%200%200-8%204%204%200%200%200%200%208Z%27%20stroke%3D%27black%27%20stroke-width%3D%272%27%20stroke-linecap%3D%27round%27%20stroke-linejoin%3D%27round%27/%3E%3C/svg%3E") no-repeat center / contain;
      }

      @media (max-width: 720px) {
        .nav a[href='/cart'] {
          position: sticky;
          right: 0;
          z-index: 2;
          background: rgba(255, 255, 255, 0.92);
          backdrop-filter: blur(8px);
          border: 1px solid rgba(236, 72, 153, 0.18);
        }
      }

      .loading,
      .loader,
      .loading-spinner,
      .spinner,
      .spinner-border,
      .spinner-grow {
        border-color: rgba(236, 72, 153, 0.25) !important;
        color: var(--brand-pink) !important;
      }

      .mat-raised-button.mat-primary,
      .mat-flat-button.mat-primary,
      .mat-fab.mat-primary,
      .mat-mini-fab.mat-primary,
      .mat-mdc-button.mat-primary,
      .mat-mdc-raised-button.mat-primary,
      .mat-mdc-unelevated-button.mat-primary,
      .mat-mdc-fab.mat-primary,
      .mat-mdc-mini-fab.mat-primary,
      .mat-mdc-button-base.mat-primary {
        background: var(--brand-grad) !important;
        color: #0b1220 !important;
      }

      .mat-mdc-progress-spinner circle,
      .mat-mdc-spinner circle,
      .mat-progress-spinner circle,
      .mat-spinner circle {
        stroke: var(--brand-pink) !important;
      }

      /* Nav responsiveness handled by the app header layout (Super-cateen/src/app/app.html). */
    </style>
    <script>
      (function () {
        function setNav() {
          var path = (window.location && window.location.pathname) || '/';
          var seg = path.split('?')[0].split('#')[0].split('/').filter(Boolean)[0] || 'dashboard';
          document.documentElement.dataset.nav = seg;
        }

        var _pushState = history.pushState;
        history.pushState = function () {
          var ret = _pushState.apply(this, arguments);
          setNav();
          return ret;
        };

        var _replaceState = history.replaceState;
        history.replaceState = function () {
          var ret = _replaceState.apply(this, arguments);
          setNav();
          return ret;
        };

        window.addEventListener('popstate', setNav);
        window.addEventListener('hashchange', setNav);
        setNav();
      })();
    </script>
  </head>
<body>
  <app-root></app-root>
</body>
</html>
